<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — {{ empresa_nome }}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="login-page">
  <div class="login-box">
    <div class="login-logo">
      <h1>{{ empresa_nome }}</h1>
      <p>Sistema de Gestão</p>
    </div>

    {% with msgs = get_flashed_messages(with_categories=true) %}
      {% for cat, msg in msgs %}
        <div class="alert alert-{{ cat }}">{{ msg }}</div>
      {% endfor %}
    {% endwith %}

    <form method="POST" action="{{ url_for('login') }}">
      <div class="form-group">
        <label>Login</label>
        <input class="form-control" type="text" name="login" autocomplete="username" required autofocus>
      </div>
      <div class="form-group">
        <label>Senha</label>
        <input class="form-control" type="password" name="senha" autocomplete="current-password" required>
      </div>
      <button type="submit" class="btn btn-primario" style="width:100%;justify-content:center;margin-top:8px;">
        Entrar
      </button>
    </form>
  </div>
</body>
</html>
